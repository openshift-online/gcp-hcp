---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: push-snapshot-to-gar
spec:
  description: |-
    Push snapshot images to Google Artifact Registry using cosign copy.
    Authenticates to GAR via Workload Identity Federation using docker-credential-gcr.
    Source images are pulled from Quay using select-oci-auth.

    The destination for each image is taken from the '.spec.data.mapping' section
    of the release plan.
  params:
    - name: release
      description: Namespaced name of release (namespace/name)
      type: string
    - name: releasePlan
      description: Namespaced name of release plan (namespace/name)
      type: string
    - name: snapshot
      description: Namespaced name of snapshot (namespace/name)
      type: string
    - name: taskGitUrl
      type: string
      description: Git repo URL for the task definition
      default: https://github.com/openshift-online/gcp-hcp.git
    - name: taskGitRevision
      type: string
      description: Git revision for the task
      default: main
    - name: skipAttestations
      description: If true, skip copying attestations and signatures
      type: string
      default: "false"
  tasks:
    - name: push-snapshot-to-gar
      taskRef:
        resolver: "git"
        params:
          - name: url
            value: $(params.taskGitUrl)
          - name: revision
            value: $(params.taskGitRevision)
          - name: pathInRepo
            value: konflux/release-pipelines/tasks/push-snapshot-to-gar.yaml
      params:
        - name: snapshot
          value: $(params.snapshot)
        - name: releasePlan
          value: $(params.releasePlan)
        - name: release
          value: $(params.release)
        - name: skipAttestations
          value: $(params.skipAttestations)

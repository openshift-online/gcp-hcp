apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-applier-test
  namespace: default
  labels:
    managed-by: kube-applier
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-applier-test
  template:
    metadata:
      labels:
        app: kube-applier-test
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 10m
              memory: 16Mi
